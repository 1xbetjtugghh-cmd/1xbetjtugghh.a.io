<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مريم ❤️</title>
<style>
/* ----- إعدادات الصفحة ----- */
body{
    background: linear-gradient(pink, white);
    font-family: Arial, sans-serif;
    text-align: center;
    direction: rtl;
    min-height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow-x: hidden;
}

/* ----- عنوان الصفحة ----- */
h1{
    color: red;
    font-size: 50px;
    margin: 10px 0;
}

/* ----- الفقرة ----- */
p{
    font-size: 25px;
    color: #333;
    margin: 10px 20px;
}

/* ----- مشغل الصوت ----- */
.A{
    border-top: blue 8px solid;
    border-bottom: #e207dd 8px solid;
    border-right: #4bccd9 8px solid;
    border-left: pink 8px solid;
    border-radius: 60px;
    padding: 10px 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.7);
    margin-bottom: 20px;
}

/* ----- القلب ----- */
.heart{
    font-size: 80px;
    animation: beat 1s infinite;
    margin: 10px 0;
}

/* نبض القلب */
@keyframes beat{
    0%{transform: scale(1);}
    25%{transform: scale(1.1);}
    50%{transform: scale(1.2);}
    75%{transform: scale(1.1);}
    100%{transform: scale(1);}
}

/* ----- الزر ----- */
button{
    padding: 12px 25px;
    font-size: 22px;
    background: red;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease-in-out;
}

button:hover{
    transform: scale(1.1);
    background: #e60000;
}

/* ----- قلوب تتساقط ----- */
.falling-heart{
    position: absolute;
    top: -50px;
    font-size: 24px;
    animation: fall 4s linear infinite;
    pointer-events: none;
}

@keyframes fall{
    0%{transform: translateY(0) rotate(0deg);}
    100%{transform: translateY(110vh) rotate(360deg);}
}
</style>
</head>
<body>

<h1>مريم ❤️</h1>

<audio class="A" controls>
  <source src="https://image2url.com/r2/default/audio/1772991397588-78559297-b3d4-42aa-ad32-065836e72fbd.mp3" type="audio/mpeg">
  متصفحك لا يدعم تشغيل الصوت
</audio>

<p>
هذا الموقع معمول بحب عشان مريم<br>
أجمل بنت في الدنيا 🌹
</p>

<div class="heart">❤️</div>

<br>

<button onclick="love()">اضغط هنا</button>

<script>
/* ----- رسالة عند الضغط على الزر ----- */
function love(){
    alert("بحبك يا مريم ❤️");
}

/* ----- إنشاء قلوب تتساقط ----- */
const colors = ["#ff4d4d","#ff9999","#ff1a75","#ff6666"];
function createFallingHeart(){
    const heart = document.createElement("div");
    heart.classList.add("falling-heart");
    heart.innerText = "❤️";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (Math.random()*20+20) + "px";
    heart.style.color = colors[Math.floor(Math.random()*colors.length)];
    document.body.appendChild(heart);

    // إزالة العنصر بعد سقوطه
    setTimeout(()=>{ heart.remove(); }, 4000);
}

/* إنشاء قلب جديد كل 0.5 ثانية */
setInterval(createFallingHeart, 500);
</script>

</body>
</html>
