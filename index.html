<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مريم ❤️</title>

<style>
      .A{
 border-top: blue 8px solid;
border-bottom:#e207dd 8px solid;
border-right: #4bccd9 8px solid;
 border-left: pink 8px solid;
 padding: 0px;
 border-radius: 60px;
 color: red;
 background: red;
  box-shadow: 0 15px 40px rgba(0,0,0,0.7);
      }
body{
    background: linear-gradient(pink, white);
    font-family: Arial;
    text-align:center;
    direction: rtl;
}

h1{
    color:red;
    font-size:50px;
    margin-top:10px;
}

p{
    font-size:25px;
    color:#333;
}

.heart{
    font-size:60px;
    animation: beat 1s infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

button{
    padding:10px 20px;
    font-size:20px;
    background:red;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>

</head>

<body>
<h1>مريم ❤️</h1>
<audio class="A" controls>
  <source src="https://image2url.com/r2/default/audio/1772991397588-78559297-b3d4-42aa-ad32-065836e72fbd.mp3" type="audio/mpeg">
</audio>
<p>
هذا الموقع معمول بحب عشان مريم<br>
أجمل بنت في الدنيا 🌹
</p>

<div class="heart">❤️</div>

<br><br>

<button onclick="love()">اضغط هنا</button>

<script>
function love(){
alert("بحبك يا مريم ❤️");
}
</script>

</body>
</html>
